<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Castelas">
<meta name="theme-color" content="#1a1208">
<link rel="manifest" href="manifest.json">
<title>Castelas — Ensemble Vocal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
<style>
:root{--gold:#c8963e;--gold-light:#e8b96a;--gold-pale:#f5e4c0;--dark:#1a1208;--dark2:#251c0d;--dark3:#332510;--dark4:#4a3820;--mid:#7a5c30;--text:#f0e6d0;--text-muted:#a08060;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.08);--border:rgba(200,150,62,0.2);--radius:16px;--radius-sm:10px;--font-serif:'Cormorant Garamond',Georgia,serif;--font-sans:'Outfit',sans-serif;--nav-h:72px;--safe-bottom:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:var(--font-sans);font-size:15px;overflow:hidden}
#app{height:100dvh;display:flex;flex-direction:column}
.view{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.view::-webkit-scrollbar{display:none}
.app-header{background:linear-gradient(180deg,var(--dark2) 0%,transparent 100%);padding:20px 20px 12px;padding-top:max(20px,env(safe-area-inset-top,20px));position:sticky;top:0;z-index:10;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.app-header h1{font-family:var(--font-serif);font-size:28px;font-weight:300;letter-spacing:.02em;color:var(--gold-light)}
.app-header h1 em{font-style:italic;color:var(--gold-pale)}
.app-header .subtitle{font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);margin-top:2px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bottom));background:var(--dark2);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;z-index:100;backdrop-filter:blur(20px)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--text-muted);font-family:var(--font-sans);font-size:10px;font-weight:500;letter-spacing:.05em;padding:4px 0;transition:color .2s}
.nav-btn .icon{font-size:22px;line-height:1;transition:transform .2s}
.nav-btn.active{color:var(--gold)}
.nav-btn.active .icon{transform:scale(1.15)}
.section{padding:0 16px 8px}
.section-title{font-family:var(--font-serif);font-size:20px;font-weight:400;color:var(--gold-light);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.section-title .count{font-family:var(--font-sans);font-size:12px;background:var(--dark3);color:var(--text-muted);padding:2px 10px;border-radius:20px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-card .stat-num{font-family:var(--font-serif);font-size:40px;font-weight:300;color:var(--gold);line-height:1}
.stat-card .stat-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-top:4px}
.next-event{margin:0 16px 16px;background:linear-gradient(135deg,var(--dark3) 0%,var(--dark4) 100%);border:1px solid var(--gold);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;cursor:pointer}
.next-event::after{content:'🎵';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:40px;opacity:.15}
.next-event .label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.next-event .title{font-family:var(--font-serif);font-size:22px;font-weight:400;color:var(--text)}
.next-event .date{font-size:13px;color:var(--text-muted);margin-top:4px}
.announce-card{margin:0 16px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer}
.badge-unread{display:inline-block;width:8px;height:8px;background:var(--gold);border-radius:50%;margin-right:6px;vertical-align:middle}
.voice-label{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;padding:0 16px;display:flex;align-items:center;gap:8px}
.voice-label::after{content:'';flex:1;height:1px;background:var(--border)}
.member-card{margin:0 16px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .2s}
.member-card:active{background:var(--surface2)}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--dark4),var(--mid));display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:18px;color:var(--gold-light);flex-shrink:0}
.member-info{flex:1;min-width:0}
.member-name{font-weight:500;font-size:14px}
.member-meta{font-size:12px;color:var(--text-muted);margin-top:2px}
.presence-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-unknown{background:var(--dark4);border:1px solid var(--text-muted)}
.piece-card{margin:0 16px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:background .2s}
.piece-card:active{background:var(--surface2)}
.piece-title{font-family:var(--font-serif);font-size:18px;font-weight:400}
.piece-composer{font-size:12px;color:var(--gold);margin-top:2px}
.piece-meta{font-size:12px;color:var(--text-muted);margin-top:4px}
.piece-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag{font-size:10px;letter-spacing:.08em;text-transform:uppercase;background:var(--dark3);color:var(--text-muted);padding:3px 10px;border-radius:20px;border:1px solid var(--border)}
.tag.voice{color:var(--gold);border-color:rgba(200,150,62,.4)}
.tag.has-pdf{color:#7ec8e3;border-color:rgba(126,200,227,.3)}
.tag.has-mp3{color:#4caf7d;border-color:rgba(76,175,125,.3)}
.tag.has-midi{color:#c87dd0;border-color:rgba(200,125,208,.3)}
/* Media */
.media-section-title{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.media-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.mp3-player{background:var(--dark3);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.mp3-track-info{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.mp3-track-icon{font-size:28px}
.mp3-track-name{font-size:14px;font-weight:500}
.mp3-track-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.mp3-controls{display:flex;flex-direction:column;gap:10px}
.mp3-progress{width:100%;height:4px;background:var(--dark4);border-radius:2px;cursor:pointer;appearance:none;outline:none}
.mp3-progress::-webkit-slider-thumb{appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);cursor:pointer}
.mp3-btns{display:flex;align-items:center;gap:12px}
.mp3-play-btn{width:44px;height:44px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s;color:var(--dark)}
.mp3-play-btn:active{transform:scale(.9)}
.mp3-time{font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums;margin-left:auto}
.voice-tracks{display:flex;flex-direction:column;gap:8px}
.voice-track{background:var(--dark4);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:center;gap:10px}
.voice-track-label{flex:1;font-size:13px}
.voice-track-btn{padding:6px 14px;border-radius:20px;background:var(--dark3);border:1px solid var(--border);color:var(--text-muted);font-size:12px;cursor:pointer;font-family:var(--font-sans);transition:background .2s,color .2s}
.voice-track-btn.playing{background:rgba(76,175,125,.2);border-color:#4caf7d;color:#4caf7d}
.midi-player{background:var(--dark3);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.midi-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.midi-icon{font-size:28px}
.midi-info{flex:1}
.midi-name{font-size:14px;font-weight:500}
.midi-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.midi-status{font-size:11px;color:var(--gold);margin-top:6px}
.midi-controls{display:flex;gap:8px;flex-wrap:wrap}
.midi-btn{flex:1;min-width:0;padding:10px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--dark4);color:var(--text-muted);font-family:var(--font-sans);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .2s,color .2s}
.midi-btn.active{background:rgba(200,125,208,.2);border-color:#c87dd0;color:#c87dd0}
.midi-tempo{display:flex;align-items:center;gap:10px;margin-top:10px}
.midi-tempo label{font-size:11px;color:var(--text-muted);white-space:nowrap}
.midi-tempo input[type=range]{flex:1;height:4px;appearance:none;background:var(--dark4);border-radius:2px;outline:none}
.midi-tempo input::-webkit-slider-thumb{appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);cursor:pointer}
.midi-tempo span{font-size:12px;color:var(--gold);min-width:40px;text-align:right}
.pdf-viewer-wrap{background:var(--dark3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.pdf-toolbar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--dark4)}
.pdf-title{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pdf-nav-btn{width:32px;height:32px;border-radius:var(--radius-sm);background:var(--dark3);border:1px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pdf-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.pdf-page-info{font-size:12px;color:var(--text-muted);white-space:nowrap}
.pdf-zoom-btn{width:32px;height:32px;border-radius:var(--radius-sm);background:var(--dark3);border:1px solid var(--border);color:var(--gold);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:bold}
.pdf-canvas-wrap{overflow:auto;max-height:420px;background:#1a1a1a}
.pdf-canvas-wrap canvas{display:block;margin:0 auto}
.pdf-loading{padding:40px;text-align:center;color:var(--text-muted);font-size:13px}
.url-input{background:var(--dark3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-family:var(--font-sans);font-size:13px;width:100%;outline:none}
.url-input:focus{border-color:var(--gold)}
.sp-config{background:var(--dark3);border:1px dashed var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.sp-config p{font-size:13px;color:var(--text-muted);margin-bottom:6px;line-height:1.5}
.sp-config .sp-icon{font-size:32px;margin-bottom:8px}
.event-card{margin:0 16px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;gap:14px;cursor:pointer;transition:background .2s}
.event-card:active{background:var(--surface2)}
.event-date-block{flex-shrink:0;width:50px;text-align:center;background:var(--dark3);border-radius:var(--radius-sm);padding:8px 4px;border:1px solid var(--border)}
.event-day{font-family:var(--font-serif);font-size:28px;font-weight:300;color:var(--gold);line-height:1}
.event-month{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
.event-body{flex:1}
.event-title{font-weight:500;font-size:15px}
.event-location{font-size:12px;color:var(--text-muted);margin-top:3px}
.event-type{display:inline-block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:2px 10px;border-radius:20px;margin-top:6px;font-weight:500}
.type-repetition{background:rgba(76,175,125,.15);color:#4caf7d}
.type-concert{background:rgba(200,150,62,.15);color:var(--gold)}
.type-ag{background:rgba(100,100,200,.15);color:#9090e0}
.presence-summary{display:flex;gap:10px;padding:0 16px 16px}
.pres-stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
.pres-stat .num{font-family:var(--font-serif);font-size:32px;font-weight:300;line-height:1}
.pres-stat .lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
.num.present{color:#4caf7d}.num.absent{color:#e05252}.num.unknown{color:var(--text-muted)}
.presence-member-row{margin:0 16px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:12px}
.pres-controls{display:flex;gap:6px;margin-left:auto}
.pres-btn{width:34px;height:34px;border-radius:50%;border:2px solid transparent;background:var(--dark3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s}
.pres-btn.active-present{background:rgba(76,175,125,.2);border-color:#4caf7d}
.pres-btn.active-absent{background:rgba(224,82,82,.2);border-color:#e05252}
.msg-list{padding:0 16px}
.msg-bubble{margin-bottom:14px;display:flex;flex-direction:column}
.msg-bubble.me{align-items:flex-end}.msg-bubble.other{align-items:flex-start}
.msg-bubble .bubble-header{font-size:11px;color:var(--text-muted);margin-bottom:4px;display:flex;gap:8px}
.bubble{max-width:80%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5}
.msg-bubble.me .bubble{background:var(--gold);color:var(--dark);border-bottom-right-radius:4px}
.msg-bubble.other .bubble{background:var(--dark3);border:1px solid var(--border);border-bottom-left-radius:4px}
.pinned-msg{margin:0 16px 14px;background:rgba(200,150,62,.1);border:1px solid rgba(200,150,62,.3);border-radius:var(--radius-sm);padding:10px 14px;display:flex;gap:10px;align-items:flex-start}
.pin-text{font-size:13px;color:var(--text-muted)}.pin-text strong{color:var(--gold-light)}
.compose-bar{position:sticky;bottom:calc(var(--nav-h) + var(--safe-bottom));padding:10px 16px;background:var(--dark2);border-top:1px solid var(--border);display:flex;gap:8px}
.compose-input{flex:1;background:var(--dark3);border:1px solid var(--border);border-radius:22px;padding:10px 16px;color:var(--text);font-family:var(--font-sans);font-size:14px;outline:none}
.compose-input::placeholder{color:var(--text-muted)}
.compose-input:focus{border-color:var(--gold)}
.send-btn{width:42px;height:42px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.sheet{width:100%;background:var(--dark2);border-top-left-radius:24px;border-top-right-radius:24px;border-top:1px solid var(--border);padding:20px 20px calc(20px + var(--safe-bottom));transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:92dvh;overflow-y:auto}
.modal-overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:var(--dark4);border-radius:2px;margin:0 auto 20px}
.sheet h2{font-family:var(--font-serif);font-size:24px;font-weight:400;color:var(--gold-light);margin-bottom:16px}
.detail-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.detail-row:last-child{border-bottom:none}
.detail-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.detail-label{color:var(--text-muted);font-size:12px}
.detail-val{color:var(--text);margin-top:2px}
.btn-sm{flex:1;padding:8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--dark3);color:var(--text-muted);font-family:var(--font-sans);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:background .2s,color .2s}
.btn-sm:active{background:var(--dark4);color:var(--text)}
.btn-sm.primary{background:var(--gold);color:var(--dark);border-color:var(--gold)}
.btn-sm:disabled{opacity:.3;cursor:not-allowed}
.fab{position:fixed;right:16px;bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);width:52px;height:52px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(200,150,62,.4);z-index:50;transition:transform .2s}
.fab:active{transform:scale(.9)}
.search-bar{margin:0 16px 16px;background:var(--dark3);border:1px solid var(--border);border-radius:22px;padding:10px 16px;display:flex;align-items:center;gap:10px}
.search-bar input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--font-sans);font-size:14px}
.search-bar input::placeholder{color:var(--text-muted)}
.search-icon{font-size:16px;color:var(--text-muted)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.view>*{animation:fadeIn .3s ease both}
.view>*:nth-child(2){animation-delay:.04s}
.view>*:nth-child(3){animation-delay:.08s}
.view>*:nth-child(4){animation-delay:.12s}
#install-banner{position:fixed;top:0;left:0;right:0;z-index:300;background:var(--gold);color:var(--dark);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:500;transform:translateY(-100%);transition:transform .4s}
#install-banner.show{transform:translateY(0)}
#install-banner button{background:var(--dark);color:var(--gold);border:none;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div id="install-banner">📲 Installer sur l'écran d'accueil<button onclick="installApp()">Installer</button></div>
  <div id="view-dashboard"  class="view" style="display:none"></div>
  <div id="view-membres"    class="view" style="display:none"></div>
  <div id="view-repertoire" class="view" style="display:none"></div>
  <div id="view-planning"   class="view" style="display:none"></div>
  <div id="view-presences"  class="view" style="display:none"></div>
  <div id="view-messages"   class="view" style="display:none"></div>
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="navigate('dashboard')"  id="nav-dashboard"><span class="icon">🏠</span><span>Accueil</span></button>
    <button class="nav-btn" onclick="navigate('membres')"   id="nav-membres"><span class="icon">👥</span><span>Membres</span></button>
    <button class="nav-btn" onclick="navigate('repertoire')" id="nav-repertoire"><span class="icon">🎼</span><span>Répertoire</span></button>
    <button class="nav-btn" onclick="navigate('planning')"  id="nav-planning"><span class="icon">📅</span><span>Planning</span></button>
    <button class="nav-btn" onclick="navigate('messages')"  id="nav-messages"><span class="icon">💬</span><span>Messages</span></button>
  </nav>
</div>
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="sheet"><div class="sheet-handle"></div><div id="modal-content"></div></div>
</div>
<script>
// ── CONFIG SharePoint ─────────────────────────────────────────────────
// Renseignez l'URL de base de votre site SharePoint (ex: https://coop.sharepoint.com/sites/Castelas)
const SP_BASE = "";

// ── DATA ──────────────────────────────────────────────────────────────
const DATA = {
  members: [

let currentView='dashboard';
let selectedPresenceEvent=1;

let audioElements={};
let midiSynth=null,midiPlaying=false,currentTempo=100;

// ── NAVIGATE ──────────────────────────────────────────────────────────
function navigate(view){
  stopAllMedia();
  document.querySelectorAll('.view').forEach(v=>v.style.display='none');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+view).style.display='block';
  document.getElementById('nav-'+(view==='presences'?'planning':view))?.classList.add('active');
  currentView=view; renderView(view);
  const el=document.getElementById('view-'+view); if(el) el.scrollTop=0;
}
function renderView(v){({dashboard:renderDashboard,membres:renderMembres,repertoire:renderRepertoire,planning:renderPlanning,presences:renderPresences,messages:renderMessages})[v]?.();}

// ── DASHBOARD ─────────────────────────────────────────────────────────
function renderDashboard(){
  const nxt=DATA.events[0];
  const np=Object.values(presenceState[nxt.id]||{}).filter(v=>v==='present').length;
  const ann=DATA.messages.filter(m=>m.pinned);
  document.getElementById('view-dashboard').innerHTML=`
    <div class="app-header"><h1><em>Ensemble Vocal</em> du Castelas</h1><div class="subtitle">Tableau de bord</div></div>
    <div class="next-event" onclick="showEventDetail(${nxt.id})">
      <div class="label">Prochain événement</div>
      <div class="title">${nxt.title}</div>
      <div class="date">📅 ${fmtDate(nxt.date)} — ${nxt.time} | 📍 ${nxt.location.split('—')[0].trim()}</div>
    </div>
    <div class="dash-grid">
      <div class="stat-card"><div class="stat-num">${DATA.members.length}</div><div class="stat-label">Choristes</div></div>
      <div class="stat-card"><div class="stat-num">${np}</div><div class="stat-label">Présents soir</div></div>
      <div class="stat-card"><div class="stat-num">${DATA.pieces.length}</div><div class="stat-label">Œuvres</div></div>
      <div class="stat-card"><div class="stat-num">${DATA.events.length}</div><div class="stat-label">Événements</div></div>
    </div>
    <div class="section"><div class="section-title">Annonces <span class="count">${ann.length}</span></div></div>
    ${ann.map(m=>`<div class="announce-card" onclick="navigate('messages')">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-weight:600;font-size:14px"><span class="badge-unread"></span>${m.author}</span><span style="font-size:11px;color:var(--text-muted)">${m.time}</span></div>
      <div style="font-size:13px;color:var(--text-muted);line-height:1.5">${m.text}</div></div>`).join('')}
    <div class="section" style="margin-top:8px"><div class="section-title">Prochaines dates</div></div>
    ${DATA.events.slice(0,3).map(ev=>evCardHTML(ev)).join('')}`;
}

// ── MEMBRES ───────────────────────────────────────────────────────────
function renderMembres(){
  const voices=[...new Set(DATA.members.map(m=>m.voice))];
  document.getElementById('view-membres').innerHTML=`
    <div class="app-header"><h1>Choristes</h1><div class="subtitle">${DATA.members.length} membres</div></div>
    <div class="search-bar"><span class="search-icon">🔍</span><input type="text" placeholder="Rechercher…" oninput="filterMembers(this.value)"></div>
    <div id="members-list">${voices.map(v=>`
      <div class="voice-label">${v} <span style="color:var(--text-muted)">(${DATA.members.filter(m=>m.voice===v).length})</span></div>
      ${DATA.members.filter(m=>m.voice===v).map(m=>mbrCardHTML(m)).join('')}`).join('')}
    </div><button class="fab" onclick="showAddMember()">➕</button>`;
}
function mbrCardHTML(m){return`<div class="member-card" onclick="showMemberDetail(${m.id})"><div class="avatar">${m.name.split(' ').map(n=>n[0]).join('')}</div><div class="member-info"><div class="member-name">${m.name}</div><div class="member-meta">${m.voice} · Depuis ${m.joined}${m.note?' · '+m.note:''}</div></div><div class="presence-dot dot-unknown"></div></div>`;}
function filterMembers(q){if(q.length<2){renderMembres();return;}const c=document.getElementById('members-list');if(c)c.innerHTML=DATA.members.filter(m=>m.name.toLowerCase().includes(q.toLowerCase())||m.voice.toLowerCase().includes(q.toLowerCase())).map(m=>mbrCardHTML(m)).join('')||'<p style="text-align:center;color:var(--text-muted);padding:20px">Aucun résultat</p>';}
function showMemberDetail(id){
  const m=DATA.members.find(x=>x.id===id);if(!m)return;
  const ep=Object.entries(presenceState).map(([eid,pr])=>{const ev=DATA.events.find(e=>e.id==eid);const s=pr[id]||'unknown';return ev?`<div class="detail-row"><span class="detail-icon">${s==='present'?'✅':s==='absent'?'❌':'❓'}</span><div><div class="detail-label">${fmtDate(ev.date)}</div><div class="detail-val">${ev.title}</div></div></div>`:''}).join('');

function buildPdfViewer(p){return`
  <div class="media-section-title">📄 Partition</div>
  <div class="pdf-viewer-wrap" id="pdf-wrap">
    <div class="pdf-toolbar">
      <span class="pdf-title">${p.title}</span>
      <button class="pdf-zoom-btn" onclick="pdfZoomChange(-0.25)">−</button>
      <button class="pdf-zoom-btn" onclick="pdfZoomChange(0.25)">+</button>
      <button class="pdf-nav-btn" id="pdf-prev" onclick="pdfNavPage(-1)">‹</button>
      <span class="pdf-page-info" id="pdf-page-info">… / …</span>
      <button class="pdf-nav-btn" id="pdf-next" onclick="pdfNavPage(1)">›</button>
      <a href="${p.pdfUrl}" target="_blank" class="pdf-nav-btn" style="text-decoration:none;font-size:14px" title="Ouvrir SharePoint">↗</a>
    </div>
    <div class="pdf-canvas-wrap" id="pdf-canvas-wrap"><div class="pdf-loading"><div class="spinner"></div><br>Chargement…</div></div>
  </div>`;}

async function loadPdf(url,title){
  if(!window.pdfjsLib){showToast('PDF.js non disponible');return;}
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  pdfPage=1;pdfZoom=1.0;
  try{
    pdfDoc=await pdfjsLib.getDocument(url).promise;
    await renderPdfPage();
  }catch(e){
    const w=document.getElementById('pdf-canvas-wrap');
    if(w)w.innerHTML=`<div class="pdf-loading" style="color:#e05252">❌ PDF inaccessible.<br><small>Vérifiez que le lien SharePoint est public ou utilisez un lien de téléchargement direct.</small><br><br><a href="${url}" target="_blank" class="btn-sm primary" style="display:inline-flex;margin-top:8px">Ouvrir dans SharePoint ↗</a></div>`;
  }
}

async function renderPdfPage(){
  if(!pdfDoc)return;
  const w=document.getElementById('pdf-canvas-wrap'),info=document.getElementById('pdf-page-info');
  if(!w)return;
  w.innerHTML='<div class="pdf-loading"><div class="spinner"></div></div>';
  const page=await pdfDoc.getPage(pdfPage);
  const scale=pdfZoom*(w.clientWidth/page.getViewport({scale:1}).width);
  const vp=page.getViewport({scale});
  const canvas=document.createElement('canvas');
  canvas.width=vp.width;canvas.height=vp.height;
  w.innerHTML='';w.appendChild(canvas);
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  if(info)info.textContent=`${pdfPage} / ${pdfDoc.numPages}`;
  const prev=document.getElementById('pdf-prev'),next=document.getElementById('pdf-next');
  if(prev)prev.disabled=pdfPage<=1;
  if(next)next.disabled=pdfPage>=pdfDoc.numPages;
}
function pdfNavPage(d){if(!pdfDoc)return;pdfPage=Math.max(1,Math.min(pdfDoc.numPages,pdfPage+d));renderPdfPage();}
function pdfZoomChange(d){pdfZoom=Math.max(0.5,Math.min(3,pdfZoom+d));renderPdfPage();}

    </div>
  </div>`;}

async function toggleMidi(pid,url){
  if(midiPlaying){stopMidi(pid);return;}
  midiSt(pid,'⏳ Chargement…');
  try{
    const buf=await fetch(url).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.arrayBuffer();});
    const midi=parseMidi(new Uint8Array(buf));
    if(!midi)throw new Error('Format MIDI invalide');
    await Tone.start();
    if(midiSynth){try{midiSynth.dispose();}catch(e){}}
    midiSynth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'triangle'},envelope:{attack:.02,decay:.1,sustain:.5,release:.8},volume:-6}).toDestination();
    scheduleMidi(pid,midi);
    Tone.Transport.start();
    midiPlaying=true;
    const btn=document.getElementById('midi-play-'+pid);
    if(btn){btn.textContent='⏸ Pause';btn.classList.add('active');}
    midiSt(pid,'▶ Lecture…');
  }catch(e){midiSt(pid,'❌ '+e.message);}
}

function scheduleMidi(pid,midi){
  Tone.Transport.cancel();
  const ppq=midi.header.ticksPerBeat||480;
  let bpm=120;
  for(const tr of midi.tracks){for(const ev of tr){if(ev.type==='setTempo'){bpm=Math.round(60000000/ev.microsec);break;}}}
  const adjBpm=bpm*(currentTempo/100);
  Tone.Transport.bpm.value=adjBpm;
  let maxEnd=0;
  for(const tr of midi.tracks){
    let ticks=0;
    for(const ev of tr){
      ticks+=ev.delta||0;
      const t=(ticks/ppq)*(60/adjBpm);
      if(ev.type==='noteOn'&&ev.vel>0){
        const note=Tone.Frequency(ev.note,'midi').toNote();
        const dur=((ev.dur||ppq/4)/ppq)*(60/adjBpm);
        Tone.Transport.schedule(ts=>midiSynth?.triggerAttackRelease(note,Math.max(.05,dur),ts,ev.vel/127),t);
        maxEnd=Math.max(maxEnd,t+dur);
      }
    }
  }
  Tone.Transport.schedule(()=>stopMidi(pid),maxEnd+0.5);
}

function stopMidi(pid){
  Tone.Transport.stop();Tone.Transport.cancel();
  if(midiSynth){try{midiSynth.releaseAll();}catch(e){}}
  midiPlaying=false;
  const btn=document.getElementById('midi-play-'+pid);
  if(btn){btn.textContent='▶ Lire';btn.classList.remove('active');}
  midiSt(pid,'Arrêté');
}
function setTempo(pid,val){
  currentTempo=parseInt(val);
  const el=document.getElementById('midi-tv-'+pid);if(el)el.textContent=val+'%';
  if(midiPlaying)Tone.Transport.bpm.value*=currentTempo/100;
}
function midiSt(pid,txt){const el=document.getElementById('midi-st-'+pid);if(el)el.textContent=txt;}

// Minimal MIDI parser
function parseMidi(b){
  let p=0;
  const r32=()=>{const v=(b[p]<<24)|(b[p+1]<<16)|(b[p+2]<<8)|b[p+3];p+=4;return v>>>0;};
  const r16=()=>{const v=(b[p]<<8)|b[p+1];p+=2;return v;};
  const rVL=()=>{let v=0,c;do{c=b[p++];v=(v<<7)|(c&0x7f);}while(c&0x80);return v;};
  if(String.fromCharCode(...b.slice(0,4))!=='MThd')return null;
  r32();const fmt=r16(),nt=r16(),tpb=r16();
  const tracks=[];
  for(let t=0;t<nt;t++){
    p+=4;const len=r32(),end=p+len,evs=[];let ls=0;
    while(p<end){
      const dt=rVL();let st=b[p];
      if(st&0x80){ls=st;p++;}else st=ls;
      const ty=st&0xf0;
      if(ty===0x90){const n=b[p++],v=b[p++];evs.push({delta:dt,type:v>0?'noteOn':'noteOff',note:n,vel:v});}
      else if(ty===0x80){const n=b[p++];p++;evs.push({delta:dt,type:'noteOff',note:n});}
      else if(ty===0xA0||ty===0xB0||ty===0xE0)p+=2;
      else if(ty===0xC0||ty===0xD0)p++;
      else if(st===0xFF){const mt=b[p++],ml=rVL();if(mt===0x51&&ml===3){const us=(b[p]<<16)|(b[p+1]<<8)|b[p+2];evs.push({delta:dt,type:'setTempo',microsec:us});}p+=ml;}
      else if(st===0xF0||st===0xF7){const l=rVL();p+=l;}
      else break;
    }
    p=end;tracks.push(evs);
  }
  return{header:{ticksPerBeat:tpb},tracks};
}

function stopAllMedia(){
  Object.values(audioElements).forEach(a=>{try{a.pause();a.currentTime=0;}catch(e){}});
  if(midiPlaying){Tone.Transport.stop();Tone.Transport.cancel();if(midiSynth){try{midiSynth.releaseAll();}catch(e){}}midiPlaying=false;}
  pdfDoc=null;
}

// ── PRÉSENCES ─────────────────────────────────────────────────────────
function renderPresences(){
  const ev=DATA.events.find(e=>e.id===selectedPresenceEvent)||DATA.events[0];
  if(!presenceState[ev.id])presenceState[ev.id]={};
  const pr=presenceState[ev.id];
  const c={present:0,absent:0,unknown:0};
  DATA.members.forEach(m=>c[pr[m.id]||'unknown']++);
  document.getElementById('view-presences').innerHTML=`
    <div class="app-header"><h1>Présences</h1><div class="subtitle">Feuille d'émargement</div></div>
    <div style="padding:0 16px 12px">
      <select onchange="selectedPresenceEvent=parseInt(this.value);renderView('presences')"
        style="width:100%;background:var(--dark3);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:var(--radius-sm);font-family:var(--font-sans);font-size:14px;outline:none">
        ${DATA.events.map(e=>`<option value="${e.id}" ${e.id===ev.id?'selected':''}>${fmtDate(e.date)} — ${e.title}</option>`).join('')}
      </select>
    </div>
    <div class="presence-summary">
      <div class="pres-stat"><div class="num present">${c.present}</div><div class="lbl">Présents</div></div>
      <div class="pres-stat"><div class="num absent">${c.absent}</div><div class="lbl">Absents</div></div>
      <div class="pres-stat"><div class="num unknown">${c.unknown}</div><div class="lbl">Inconnu</div></div>
    </div>
    ${[...new Set(DATA.members.map(m=>m.voice))].map(v=>`
      <div class="voice-label" style="padding:0 16px;margin-bottom:8px">${v}</div>
      ${DATA.members.filter(m=>m.voice===v).map(m=>`
        <div class="presence-member-row">
          <div class="avatar" style="width:36px;height:36px;font-size:14px">${m.name.split(' ').map(n=>n[0]).join('')}</div>
          <div style="flex:1"><div style="font-size:14px;font-weight:500">${m.name}</div><div style="font-size:11px;color:var(--text-muted)">${m.voice}</div></div>
          <div class="pres-controls">
            <button class="pres-btn ${(pr[m.id]||'unknown')==='present'?'active-present':''}" onclick="setPres(${ev.id},${m.id},'present')">✅</button>
            <button class="pres-btn ${(pr[m.id]||'unknown')==='absent'?'active-absent':''}" onclick="setPres(${ev.id},${m.id},'absent')">❌</button>
          </div>
        </div>`).join('')}`).join('')}`;
}
function setPres(evId,mId,s){if(!presenceState[evId])presenceState[evId]={};presenceState[evId][mId]=presenceState[evId][mId]===s?'unknown':s;renderView('presences');}

// ── MESSAGES ──────────────────────────────────────────────────────────
function renderMessages(){
  const pin=messages.find(m=>m.pinned);
  document.getElementById('view-messages').innerHTML=`
    <div class="app-header"><h1>Messages</h1><div class="subtitle">Groupe Ensemble Vocal</div></div>
    ${pin?`<div class="pinned-msg"><span style="font-size:16px;flex-shrink:0">📌</span><div class="pin-text"><strong>Épinglé :</strong> ${pin.text.substring(0,80)}…</div></div>`:''}
    <div class="msg-list" id="msg-list">
      ${messages.map(m=>`<div class="msg-bubble ${m.me?'me':'other'}">
        <div class="bubble-header">${!m.me?`<span>${m.author}</span>`:''}<span>${m.time}</span></div>
        <div class="bubble">${m.text}</div>
      </div>`).join('')}
    </div>
    <div class="compose-bar">
      <input class="compose-input" id="msg-in" type="text" placeholder="Écrire…" onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>`;
  const v=document.getElementById('view-messages');
  setTimeout(()=>{if(v)v.scrollTop=v.scrollHeight;},50);
}
function sendMsg(){const i=document.getElementById('msg-in'),t=i?.value.trim();if(!t)return;messages.push({id:messages.length+1,author:'Moi',me:true,time:'Maintenant',text:t});i.value='';renderMessages();}

// ── HELPERS ───────────────────────────────────────────────────────────
function fmtDate(s){return new Date(s).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'long',year:'numeric'});}
function openModal(h){document.getElementById('modal-content').innerHTML=h;document.getElementById('modal').classList.add('open');}
function closeModalFn(){document.getElementById('modal').classList.remove('open');}
function closeModal(e){if(e.target===document.getElementById('modal'))closeModalFn();}
function dlFile(url,name){if(!url)return;const a=document.createElement('a');a.href=url;a.download=name;a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);}
function showToast(msg){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 80px);left:50%;transform:translateX(-50%);background:var(--dark3);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:22px;font-size:13px;z-index:500;white-space:nowrap;opacity:0;transition:opacity .2s';document.body.appendChild(t);}t.textContent=msg;t.style.opacity=1;clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity=0,2500);}
function showAddMember(){openModal(`<h2>Nouveau choriste</h2><div style="display:flex;flex-direction:column;gap:12px;margin-top:16px"><input class="url-input" placeholder="Prénom Nom"><select style="background:var(--dark3);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:var(--radius-sm);font-family:var(--font-sans);font-size:14px;outline:none"><option>Soprano</option><option>Alto</option><option>Ténor</option><option>Baryton</option><option>Basse</option></select><input class="url-input" placeholder="Téléphone"><input class="url-input" placeholder="Email"><button class="btn-sm primary" style="padding:12px" onclick="showToast('Choriste ajouté !')">✅ Ajouter</button></div>`);}
function showAddPiece(){openModal(`<h2>Nouvelle œuvre</h2><div style="display:flex;flex-direction:column;gap:12px;margin-top:16px"><input class="url-input" placeholder="Titre"><input class="url-input" placeholder="Compositeur"><input class="url-input" placeholder="URL Partition PDF (SharePoint)"><input class="url-input" placeholder="URL MP3"><input class="url-input" placeholder="URL MIDI"><button class="btn-sm primary" style="padding:12px" onclick="showToast('Œuvre ajoutée !')">✅ Ajouter</button></div>`);}

// ── PWA ───────────────────────────────────────────────────────────────
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').classList.add('show');});
async function installApp(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt=null;document.getElementById('install-banner').classList.remove('show');}
window.addEventListener('appinstalled',()=>document.getElementById('install-banner').classList.remove('show'));
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

navigate('dashboard');
</script>
</body>
</html>
